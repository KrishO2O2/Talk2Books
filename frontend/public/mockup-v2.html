<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Talk2Books — AI Document Reader</title>
  <meta name="description" content="Talk2Books is an AI-powered RAG document reader. Converse with your books." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300;1,9..40,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Playfair Display"', 'Georgia', 'serif'],
            body: ['"DM Sans"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
        },
      },
    };
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { background: #050505; color: #fff; font-family: 'DM Sans', system-ui, sans-serif; overflow-x: hidden; }

    ::selection { background: rgba(99,102,241,0.3); color: #fff; }

    ::-webkit-scrollbar { width: 0px; }

    /* ═══════════════════════════════════════════
       MOTION SYSTEM — "Studio Dumbar" Kinetics
       ═══════════════════════════════════════════ */

    /* 1. Staggered Slide-Up Fade */
    @keyframes slideUpFade {
      0%   { opacity: 0; transform: translateY(40px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .reveal {
      opacity: 0;
      animation: slideUpFade 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* 2. Kinetic Text Clip Reveal */
    @keyframes clipRevealUp {
      0%   { transform: translateY(115%); }
      100% { transform: translateY(0%); }
    }
    .kinetic-wrap {
      overflow: hidden;
      display: inline-block;
      vertical-align: bottom;
    }
    .kinetic-inner {
      display: inline-block;
      transform: translateY(115%);
      animation: clipRevealUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* 3. Horizontal Rule Expand */
    @keyframes lineExpand {
      0%   { transform: scaleX(0); opacity: 0; }
      100% { transform: scaleX(1); opacity: 1; }
    }
    .line-reveal {
      transform-origin: left center;
      opacity: 0;
      animation: lineExpand 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* 4. Editorial word-by-word fade */
    @keyframes wordFade {
      0%   { opacity: 0; transform: translateY(6px); filter: blur(3px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }
    .word-reveal {
      display: inline-block;
      opacity: 0;
      animation: wordFade 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* 5. Glow pulse on active passage */
    @keyframes glowBreath {
      0%, 100% { box-shadow: -2px 0 12px rgba(99,102,241,0.08); }
      50%      { box-shadow: -2px 0 24px rgba(99,102,241,0.2); }
    }
    .passage-glow { animation: glowBreath 4s ease-in-out infinite; }

    /* 6. Subtle cursor blink */
    @keyframes cursorBlink { 0%,100%{opacity:1} 50%{opacity:0} }
    .blink { animation: cursorBlink 1.1s step-end infinite; }

    /* 7. Fade-in for telemetry */
    @keyframes fadeIn {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }

    /* 8. Float micro-motion on input pill */
    @keyframes microFloat {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(-3px); }
    }
    .pill-float { animation: microFloat 5s ease-in-out infinite; }

    /* 9. Accent dot pulse */
    @keyframes dotPulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50%      { transform: scale(1.8); opacity: 1; }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Lucide Icon Bridge ── */
    function Icon({ name, size = 16, className = '', sw = 1.5 }) {
      const r = useRef(null);
      useEffect(() => {
        if (r.current && lucide.icons[name]) {
          r.current.innerHTML = '';
          const s = lucide.createElement(lucide.icons[name]);
          s.setAttribute('width', size);
          s.setAttribute('height', size);
          s.setAttribute('stroke-width', sw);
          if (className) s.setAttribute('class', className);
          r.current.appendChild(s);
        }
      }, [name, size, className, sw]);
      return <span ref={r} className="inline-flex items-center justify-center" />;
    }

    /* ── Kinetic Text ── */
    function Kinetic({ children, delay = 0, className = '' }) {
      return (
        <span className="kinetic-wrap">
          <span className={`kinetic-inner ${className}`} style={{ animationDelay: `${delay}s` }}>{children}</span>
        </span>
      );
    }

    /* ── Editorial Word Reveal ── */
    function WordReveal({ text, baseDelay = 0 }) {
      const words = text.split(' ');
      return (
        <>
          {words.map((w, i) => (
            <span key={i}>
              <span className="word-reveal" style={{ animationDelay: `${baseDelay + i * 0.04}s` }}>{w}</span>
              {' '}
            </span>
          ))}
        </>
      );
    }

    /* ══════════════════════════════════════
       KNOWLEDGE VIEWER (Left — no boxes)
       ══════════════════════════════════════ */
    function KnowledgeViewer() {
      const passages = [
        {
          id: '01',
          chapter: 'III',
          title: 'The Architecture of Memory',
          confidence: 94,
          page: 47,
          body: `Human memory does not function like a filing cabinet. Instead, it is a fluid, reconstructive process. Each time we recall an event, we do not simply retrieve a stored record — rather, we actively rebuild the memory from scattered neural traces, influenced by our current state of mind and the questions we are asked.`,
          active: true,
        },
        {
          id: '02',
          chapter: 'V',
          title: 'Distributed Representations',
          confidence: 87,
          page: 112,
          body: `The concept of distributed representation stands as one of the most profound insights in modern cognitive science. Unlike localist schemes, distributed representations spread meaning across many units, granting a natural capacity for generalization and graceful degradation.`,
          active: false,
        },
        {
          id: '03',
          chapter: 'VIII',
          title: 'Attention & Binding',
          confidence: 79,
          page: 203,
          body: `Attention serves as the binding mechanism of conscious experience. Without it, the parallel streams of visual, auditory, and somatosensory processing would remain forever disjointed — a blooming, buzzing confusion.`,
          active: false,
        },
      ];

      return (
        <div className="relative">
          {/* Section Label — microscopic, tracked */}
          <div className="reveal mb-12" style={{ animationDelay: '0.3s' }}>
            <span className="font-mono text-[9px] tracking-[0.35em] uppercase text-white/25 select-none">
              Retrieved Context · {passages.length} Passages
            </span>
          </div>

          {/* Active Document */}
          <div className="reveal mb-16" style={{ animationDelay: '0.45s' }}>
            <div className="flex items-center gap-3 mb-1">
              <div className="w-[3px] h-[3px] rounded-full bg-indigo-400" style={{ animation: 'dotPulse 2s ease-in-out infinite' }} />
              <span className="font-mono text-[9px] tracking-[0.3em] uppercase text-indigo-400/60">Active Source</span>
            </div>
            <h3 className="font-display text-[15px] text-white/50 font-normal italic ml-[15px]">
              Cognitive Architectures — A Modern Survey
            </h3>
            <span className="font-mono text-[9px] text-white/20 ml-[15px]">342 pp · 2024 · PDF</span>
          </div>

          {/* Passages */}
          <div className="space-y-16">
            {passages.map((p, i) => (
              <div
                key={p.id}
                className="reveal relative"
                style={{ animationDelay: `${0.55 + i * 0.15}s` }}
              >
                {/* Technical metadata — microscopic */}
                <div className="flex items-baseline gap-4 mb-4">
                  <span className="font-mono text-[9px] tracking-[0.3em] uppercase text-white/15">
                    Chunk_{p.id}
                  </span>
                  <span className="font-mono text-[9px] tracking-[0.2em] text-white/15">
                    //
                  </span>
                  <span className="font-mono text-[9px] tracking-[0.2em] text-white/15">
                    Ch. {p.chapter}
                  </span>
                  <span className="font-mono text-[9px] tracking-[0.2em] text-white/15">
                    ·
                  </span>
                  <span className="font-mono text-[9px] tracking-[0.2em] text-white/15">
                    p. {p.page}
                  </span>
                  <span className="ml-auto font-mono text-[9px] tracking-[0.2em]" style={{ color: p.active ? 'rgba(129,140,248,0.7)' : 'rgba(255,255,255,0.15)' }}>
                    Confidence: {p.confidence}%
                  </span>
                </div>

                {/* The passage itself */}
                <div className={`relative pl-6 ${p.active ? 'passage-glow' : ''}`}>
                  {/* Vertical accent stroke */}
                  <div
                    className={`absolute left-0 top-0 bottom-0 w-[2px] rounded-full ${
                      p.active
                        ? 'bg-gradient-to-b from-indigo-400 via-indigo-500/60 to-transparent'
                        : 'bg-white/[0.06]'
                    }`}
                  />

                  {/* Chapter Title */}
                  <h2 className={`font-display text-[22px] leading-[1.2] mb-4 font-medium ${
                    p.active ? 'text-white' : 'text-white/30'
                  }`}>
                    {p.title}
                  </h2>

                  {/* Body */}
                  <p className={`font-display text-[16.5px] leading-[1.85] font-normal italic ${
                    p.active ? 'text-white/60' : 'text-white/20'
                  }`}>
                    {p.body}
                  </p>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       CHAT STAGE (Right — borderless)
       ══════════════════════════════════════ */
    function ChatStage() {
      const conversation = [
        {
          role: 'user',
          text: 'How does the book describe the relationship between attention and memory formation?',
        },
        {
          role: 'ai',
          paragraphs: [
            'The text positions attention as the indispensable bridge between perception and lasting memory. Drawing on Chapter III, the author argues that memory is not a passive recording but an active reconstruction — each recall event rebuilds the trace from fragments scattered across cortical networks.',
            'This reconstructive nature means that the quality of encoding is directly governed by attention at the moment of experience. The author invokes William James\'s image of the unattended world as "a blooming, buzzing confusion" to illustrate that without selective focus, sensory streams remain disjointed and never consolidate into coherent episodic traces.',
            'Critically, distributed representations allow the system to degrade gracefully: even partial attention can capture enough binding information to form a memory, though one that is less vivid and more susceptible to distortion over time.',
          ],
          sources: [
            { label: 'Ch. III', page: 47 },
            { label: 'Ch. V', page: 112 },
            { label: 'Ch. VIII', page: 203 },
          ],
        },
      ];

      return (
        <div className="relative flex flex-col h-full">
          {/* Section Label */}
          <div className="reveal mb-12" style={{ animationDelay: '0.35s' }}>
            <span className="font-mono text-[9px] tracking-[0.35em] uppercase text-white/25 select-none">
              Conversation
            </span>
          </div>

          {/* Messages */}
          <div className="flex-1 space-y-16 pb-32">
            {conversation.map((msg, mi) =>
              msg.role === 'user' ? (
                <div key={mi} className="reveal" style={{ animationDelay: `${0.5 + mi * 0.2}s` }}>
                  {/* User label */}
                  <div className="flex items-center gap-3 mb-4">
                    <span className="font-mono text-[9px] tracking-[0.3em] uppercase text-white/20">You</span>
                    <div className="flex-1 h-[1px] bg-white/[0.04] line-reveal" style={{ animationDelay: `${0.6 + mi * 0.2}s` }} />
                  </div>
                  <p className="font-display text-[28px] leading-[1.35] text-white/90 font-medium max-w-[90%]">
                    {msg.text}
                  </p>
                </div>
              ) : (
                <div key={mi} className="reveal" style={{ animationDelay: `${0.7 + mi * 0.2}s` }}>
                  {/* AI label */}
                  <div className="flex items-center gap-3 mb-6">
                    <div className="w-[5px] h-[5px] rounded-full bg-indigo-400/60" style={{ animation: 'dotPulse 2.5s ease-in-out infinite' }} />
                    <span className="font-mono text-[9px] tracking-[0.3em] uppercase text-indigo-400/40">Talk2Books</span>
                    <div className="flex-1 h-[1px] bg-indigo-400/[0.06] line-reveal" style={{ animationDelay: '0.9s' }} />
                  </div>

                  {/* Typeset paragraphs — editorial, no bubbles */}
                  <div className="space-y-6">
                    {msg.paragraphs.map((para, pi) => (
                      <p
                        key={pi}
                        className="font-display text-[17.5px] leading-[1.9] text-white/55 font-normal"
                        style={{ textIndent: pi > 0 ? '2em' : '0' }}
                      >
                        <WordReveal text={para} baseDelay={1.0 + pi * 0.6} />
                      </p>
                    ))}
                  </div>

                  {/* Source citations — tiny, elegant */}
                  <div className="mt-8 flex items-center gap-4">
                    <span className="font-mono text-[8px] tracking-[0.35em] uppercase text-white/15">Sources</span>
                    {msg.sources.map((s, si) => (
                      <span
                        key={si}
                        className="font-mono text-[9px] tracking-[0.15em] text-indigo-400/40 cursor-pointer hover:text-indigo-400/80 transition-colors duration-500"
                      >
                        {s.label}, p.{s.page}
                      </span>
                    ))}
                  </div>
                </div>
              )
            )}

            {/* Thinking indicator */}
            <div className="reveal flex items-center gap-3" style={{ animationDelay: '2.8s' }}>
              <div className="w-[5px] h-[5px] rounded-full bg-indigo-400/40" style={{ animation: 'dotPulse 2s ease-in-out infinite' }} />
              <span className="font-mono text-[9px] tracking-[0.3em] uppercase text-indigo-400/25">Reasoning…</span>
              <span className="w-[1px] h-3 bg-indigo-400/30 blink ml-1" />
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       APP
       ══════════════════════════════════════ */
    function App() {
      return (
        <div className="relative min-h-screen bg-[#050505] overflow-hidden">

          {/* ── Ambient background glow ── */}
          <div
            className="pointer-events-none fixed top-[-20%] left-[15%] w-[50vw] h-[50vw] rounded-full"
            style={{
              background: 'radial-gradient(circle, rgba(99,102,241,0.03) 0%, transparent 70%)',
            }}
          />
          <div
            className="pointer-events-none fixed bottom-[-30%] right-[5%] w-[60vw] h-[60vw] rounded-full"
            style={{
              background: 'radial-gradient(circle, rgba(99,102,241,0.02) 0%, transparent 70%)',
            }}
          />

          {/* ════════════ HEADER ════════════ */}
          <header className="relative z-10 flex items-end justify-between px-10 pt-10 pb-6 lg:px-16 lg:pt-14">
            {/* Logo — kinetic reveal */}
            <div>
              <h1 className="font-display font-bold leading-none" style={{ fontSize: 'clamp(36px, 4.5vw, 64px)' }}>
                <Kinetic delay={0.15}>
                  <span className="text-white">Talk</span>
                </Kinetic>
                <Kinetic delay={0.28}>
                  <span className="text-indigo-400">2</span>
                </Kinetic>
                <Kinetic delay={0.4}>
                  <span className="text-white">Books</span>
                </Kinetic>
              </h1>
              <div className="overflow-hidden mt-2">
                <p
                  className="font-mono text-[9px] tracking-[0.45em] uppercase text-white/20 reveal"
                  style={{ animationDelay: '0.6s' }}
                >
                  AI-Powered Document Intelligence
                </p>
              </div>
            </div>

            {/* Right nav — tiny, invisible until needed */}
            <nav className="reveal flex items-center gap-6" style={{ animationDelay: '0.7s' }}>
              <button className="group flex items-center gap-2 cursor-pointer">
                <Icon name="upload" size={13} className="text-white/20 group-hover:text-indigo-400 transition-colors duration-500" sw={1.2} />
                <span className="font-mono text-[9px] tracking-[0.3em] uppercase text-white/20 group-hover:text-white/50 transition-colors duration-500">Upload</span>
              </button>
              <button className="group flex items-center gap-2 cursor-pointer">
                <Icon name="library" size={13} className="text-white/20 group-hover:text-indigo-400 transition-colors duration-500" sw={1.2} />
                <span className="font-mono text-[9px] tracking-[0.3em] uppercase text-white/20 group-hover:text-white/50 transition-colors duration-500">Library</span>
              </button>
              <div className="w-[1px] h-3 bg-white/[0.06]" />
              <button className="group cursor-pointer">
                <Icon name="bell" size={14} className="text-white/15 group-hover:text-white/40 transition-colors duration-500" sw={1.2} />
              </button>
              <div className="w-6 h-6 rounded-full border border-white/[0.08] flex items-center justify-center cursor-pointer hover:border-indigo-400/30 transition-colors duration-500">
                <Icon name="user" size={11} className="text-white/20" sw={1.2} />
              </div>
            </nav>
          </header>

          {/* ── Divider ── */}
          <div className="mx-10 lg:mx-16 h-[1px] bg-white/[0.04] line-reveal" style={{ animationDelay: '0.5s' }} />

          {/* ════════════ MAIN CONTENT ════════════ */}
          <main className="relative z-10 grid grid-cols-12 gap-0 px-10 pt-12 pb-24 lg:px-16 lg:pt-16 lg:pb-28 min-h-[calc(100vh-160px)]">
            {/* LEFT — Knowledge Viewer (5 cols, breathing room) */}
            <div className="col-span-5 pr-12 border-r border-white/[0.03]">
              <KnowledgeViewer />
            </div>

            {/* RIGHT — Chat Stage (7 cols, offset left padding) */}
            <div className="col-span-7 pl-16">
              <ChatStage />
            </div>
          </main>

          {/* ════════════ INPUT PILL ════════════ */}
          <div
            className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[420px] max-w-[90vw] rounded-full backdrop-blur-2xl bg-white/[0.03] border border-white/[0.07] shadow-2xl shadow-black/40 p-1.5 flex items-center gap-2 z-50 pill-float reveal"
            style={{ animationDelay: '1.2s' }}
          >
            <button className="w-8 h-8 rounded-full flex items-center justify-center hover:bg-white/[0.04] transition-colors duration-500 shrink-0">
              <Icon name="paperclip" size={13} className="text-white/20" sw={1.2} />
            </button>
            <input
              type="text"
              placeholder="Ask your document…"
              className="flex-1 bg-transparent text-white/80 text-[13px] placeholder-white/15 outline-none font-body tracking-wide"
            />
            <button className="w-8 h-8 rounded-full bg-indigo-500/80 hover:bg-indigo-400 flex items-center justify-center transition-all duration-500 hover:scale-105 shrink-0">
              <Icon name="arrow-up" size={14} className="text-white" sw={2} />
            </button>
          </div>

          {/* ════════════ COLOPHON FOOTER ════════════ */}
          <footer
            className="fixed bottom-0 left-0 right-0 z-40 px-10 lg:px-16 py-3 flex items-center justify-between pointer-events-none reveal"
            style={{ animationDelay: '1.6s' }}
          >
            <div className="flex items-center gap-4">
              <span className="font-mono text-[8px] tracking-[0.4em] uppercase text-white/10">
                Model
              </span>
              <span className="font-mono text-[8px] tracking-[0.2em] text-white/10">
                //
              </span>
              <span className="font-mono text-[8px] tracking-[0.15em] text-indigo-400/25">
                phi4-mini
              </span>
              <span className="font-mono text-[8px] tracking-[0.2em] text-white/[0.06]">·</span>
              <span className="font-mono text-[8px] tracking-[0.15em] text-white/10">
                142ms latency
              </span>
            </div>
            <div className="flex items-center gap-4">
              <span className="font-mono text-[8px] tracking-[0.15em] text-white/10">
                Qdrant
              </span>
              <div className="w-[3px] h-[3px] rounded-full bg-emerald-500/40" />
              <span className="font-mono text-[8px] tracking-[0.2em] text-white/[0.06]">·</span>
              <span className="font-mono text-[8px] tracking-[0.15em] text-white/10">
                1,847 vectors
              </span>
              <span className="font-mono text-[8px] tracking-[0.2em] text-white/[0.06]">·</span>
              <span className="font-mono text-[8px] tracking-[0.15em] text-white/10">
                all-MiniLM-L6
              </span>
            </div>
          </footer>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
