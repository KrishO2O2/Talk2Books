  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ═══════ KEYFRAMES ═══════ */

      100% { opacity: 1; transform: translateY(0); }
    }
    .reveal {
      opacity: 0;
      animation: slideUpFade 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;

      0%   { transform: translateY(115%); }
      100% { transform: translateY(0%); }
    }
    .k-wrap { overflow: hidden; display: inline-block; vertical-align: bottom; }
    .k-inner {
      display: inline-block;
      transform: translateY(115%);
      animation: clipUp 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes fadeWord {
      0%   { opacity: 0; transform: translateY(5px); filter: blur(2px); }

    .w-anim { display: inline-block; opacity: 0; animation: fadeWord 0.4s cubic-bezier(0.22,1,0.36,1) forwards; }

    @keyframes marquee {

      100% { transform: translateX(-50%); }
    }
    .marquee-track { animation: marquee 25s linear infinite; }
    .marquee-track:hover { animation-play-state: paused; }

    @keyframes dotFade {
      0%, 100% { opacity: 0.15; }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.3; }

    @keyframes lineGrow {
      0%   { transform: scaleX(0); }

    @keyframes spin-slow { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
    .spin-slow { animation: spin-slow 20s linear infinite; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    .float { animation: float 6s ease-in-out infinite; }

    /* Dot grid */
    .dot-grid {
      background-image: radial-gradient(circle, rgba(196,154,78,0.12) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* Tab active indicator */
    .tab-active { position: relative; }
    .tab-active::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 2px;
      background: #C49A4E;
      border-radius: 1px;
    }

    /* Gradient border trick */
    .gradient-border {
      position: relative;
    }
    .gradient-border::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(196,154,78,0.3), rgba(196,154,78,0.05), rgba(196,154,78,0.15));

      -webkit-mask-composite: xor;
      mask-composite: exclude;

    /* Noise texture overlay */

      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.025;

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Icon Bridge ── */
    function Icon({ name, size = 16, className = '', sw = 1.5 }) {
      const r = useRef(null);
      useEffect(() => {
        if (r.current && lucide.icons[name]) {
          r.current.innerHTML = '';
          const s = lucide.createElement(lucide.icons[name]);
          s.setAttribute('width', size);
          s.setAttribute('height', size);
          s.setAttribute('stroke-width', sw);
          if (className) s.setAttribute('class', className);
          r.current.appendChild(s);
        }
      }, [name, size, className, sw]);
      return <span ref={r} className="inline-flex items-center justify-center" />;
    }

    function K({ children, delay = 0 }) {
      return <span className="k-wrap"><span className="k-inner" style={{ animationDelay: `${delay}s` }}>{children}</span></span>;
    }

    function WA({ text, base = 0 }) {
      return <>{text.split(' ').map((w, i) => <span key={i}><span className="w-anim" style={{ animationDelay: `${base + i * 0.03}s` }}>{w}</span>{' '}</span>)}</>;
    }

    /* ══════════════════════════════════
       LANDING PAGE VIEW
       ══════════════════════════════════ */
    function LandingPage() {
      return (
        <>

            <div className="grid grid-cols-12 gap-4">

                    <p className="font-serif text-[24px] leading-[1.35] text-white/80 max-w-xl">
                      How does the book describe the relationship between attention and memory formation?
                    </p>
                  </div>

                  {/* AI response */}
                  <div className="reveal" style={{ animationDelay: '0.5s' }}>
                    <div className="flex items-center gap-2 mb-4">
                      <div className="w-5 h-5 rounded-md bg-gold-400/10 flex items-center justify-center">

                    </div>

                    <div className="space-y-5 max-w-xl">
                      <p className="font-serif text-[15px] leading-[1.9] text-white/45">
                        <WA text="The text positions attention as the indispensable bridge between perception and lasting memory. Drawing on Chapter III, the author argues that memory is not a passive recording but an active reconstruction — each recall event rebuilds the trace from fragments scattered across cortical networks." base={0.7} />
                      </p>
                      <p className="font-serif text-[15px] leading-[1.9] text-white/45" style={{ textIndent: '1.5em' }}>
                        <WA text='This reconstructive nature means that the quality of encoding is directly governed by attention at the moment of experience. The author invokes William James&#39;s image of the unattended world as "a blooming, buzzing confusion" to illustrate that without selective focus, sensory streams never consolidate into coherent episodic traces.' base={1.8} />
                      </p>
                    </div>

                    {/* Sources */}
                    <div className="flex items-center gap-3 mt-6">
                      <span className="font-mono text-[8px] tracking-[0.3em] uppercase text-white/10">Sources</span>

                    </div>
                  </div>
                </div>

                    <div className="flex items-center gap-2">
                      <span className="font-mono text-[9px] text-white/10 hidden md:inline">⌘ Enter</span>
                      <button className="w-8 h-8 rounded-xl bg-gold-400 hover:bg-gold-300 flex items-center justify-center transition-all duration-300 shrink-0">
                        <Icon name="arrow-up" size={14} className="text-canvas" sw={2.5} />
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }
